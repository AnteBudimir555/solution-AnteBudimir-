# Postgres profile: production-like, used by docker-compose. Connection details
# come from environment variables (see docker-compose.yml / README).
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/middleware}
    driver-class-name: org.postgresql.Driver
    # No defaults: an unset value fails placeholder resolution at startup, matching the fail-fast
    # JWT_SECRET approach, so a production-like deployment can never fall back to known credentials.
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # validate/update in real deployments; update keeps the demo self-contained.
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false
  h2:
    console:
      enabled: false

# JWT_SECRET must be supplied via the environment in this profile; there is no default (see
# application.yml), so startup fails fast if it is missing. The seed user stays disabled so no
# known-credential account is ever created in a production-like deployment.
middleware:
  security:
    seed-user:
      enabled: false
