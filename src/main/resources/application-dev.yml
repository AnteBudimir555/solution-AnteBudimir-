# Dev profile: embedded H2, zero external setup. Default profile for local runs.
spring:
  datasource:
    url: jdbc:h2:mem:middleware;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

middleware:
  # Dev-only, intentionally insecure values. The postgres profile does not inherit these:
  # it requires JWT_SECRET from the environment and keeps the seed user disabled.
  jwt:
    secret: dev-only-insecure-jwt-secret-please-override-in-real-environments-0123456789
  security:
    seed-user:
      enabled: true
      username: demo
      password: demo1234

logging:
  level:
    com.abysalto.middleware: DEBUG
