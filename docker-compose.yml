# One-command startup: Postgres + the middleware running under the `postgres` profile.
#
#   docker compose up --build
#
# The postgres profile has NO defaults for DB_USERNAME / DB_PASSWORD / JWT_SECRET and fails fast at
# startup if any is unset, so this file supplies them. Each value can be overridden from the shell
# environment or a local `.env` file (e.g. `JWT_SECRET=... docker compose up`); the fallbacks after
# `:-` are demo defaults so a plain `docker compose up` works out of the box.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: middleware
      POSTGRES_USER: ${DB_USERNAME:-middleware}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-middleware}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-middleware} -d middleware"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://db:5432/middleware
      DB_USERNAME: ${DB_USERNAME:-middleware}
      DB_PASSWORD: ${DB_PASSWORD:-middleware}
      # Demo secret only — override with a real 32+ byte secret in any real deployment.
      JWT_SECRET: ${JWT_SECRET:-docker-demo-insecure-jwt-secret-change-me-0123456789}
      # Demo only: seed a known user so the JWT-protected API is testable immediately. The postgres
      # profile keeps seeding disabled unless SEED_USER_ENABLED is explicitly set (as it is here).
      SEED_USER_ENABLED: "true"
      SEED_USER_USERNAME: ${SEED_USER_USERNAME:-demo}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-demo1234}
    ports:
      - "8080:8080"

volumes:
  pgdata:
